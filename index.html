<body>

    <!-- 1. Navigation Bar (Stays at the top) -->
    <nav style="background: #333; padding: 10px; display: flex; gap: 10px;">
        <button class="my-button" style="padding: 5px 15px;" onclick="goHome()">🏠 Home</button>
        <span style="color: white; align-self: center;">My Game Hub</span>
    </nav>

    <!-- 2. Main Content Area -->
    <div id="main-content" style="padding: 20px; text-align: center;">
        <h1>Game Collection v.02</h1>
        
        <!-- Add all your mini-game buttons here -->
        <button class="my-button" onclick="loadGame('whackamole/whackamole.html')">Whackamole!</button>
        <button class="my-button" onclick="loadGame('dinorun/dinorun.html')">Dino Run!</button>
    </div>

    <!-- 3. The "Frame" where games will actually play -->
    <iframe id="game-frame" src="" style="display:none; width: 100%; height: 80vh; border: none;"></iframe>

    <script>
        const content = document.getElementById('main-content');
        const frame = document.getElementById('game-frame');

        function loadGame(url) {
            content.style.display = 'none'; // Hide the menu
            frame.style.display = 'block';  // Show the iframe
            frame.src = url;                // Load the game
        }

        function goHome() {
            frame.style.display = 'none';   // Hide the game
            content.style.display = 'block';// Show the menu
            frame.src = "";                 // Stop the game from running in background
        }
    </script>

</body>
